<!doctype html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0f172a" />
        <title>Offline — Teacha Rewards</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: #f8fafc;
                color: #0f172a;
                font-family:
                    -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI',
                    Roboto, sans-serif;
            }
            .card {
                max-width: 360px;
                text-align: center;
                background: #ffffff;
                border: 1px solid #e2e8f0;
                border-radius: 24px;
                padding: 32px 24px;
                box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
            }
            .logo {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 64px;
                height: 64px;
                margin-bottom: 16px;
            }
            .logo img {
                width: 100%;
                height: 100%;
            }
            h1 {
                font-size: 22px;
                font-weight: 600;
                margin-bottom: 8px;
            }
            p {
                font-size: 14px;
                line-height: 1.5;
                color: #475569;
                margin-bottom: 16px;
            }
            button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 44px;
                padding: 0 24px;
                border-radius: 16px;
                border: none;
                background: #344c28;
                color: #f8fafc;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
            }
            button:hover {
                background: #243618;
            }
        </style>
    </head>
    <body>
        <main class="card">
            <div class="logo">
                <img
                    src="/favicon.svg"
                    alt="Teacha Rewards"
                    width="64"
                    height="64"
                />
            </div>
            <h1>Jste offline</h1>
            <p>
                Nemůžeme se spojit s Teacha Rewards. Připojte se znovu pro
                zobrazení peněženky nebo otevření nové.
            </p>
            <button type="button" onclick="window.location.reload()">
                Zkusit znovu
            </button>
        </main>
    </body>
</html>
