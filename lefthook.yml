# Minimum lefthook version required to interpret this config.
min_version: 1.7.0

# Source-of-truth commands. The Makefile is the primary workflow entry;
# these hooks call its targets so behavior stays in one place.

pre-commit:
  parallel: true
  commands:
    pint:
      glob: '*.php'
      run: ./vendor/bin/pint {staged_files}
      stage_fixed: true
    prettier:
      glob:
        - '*.{js,ts,vue,json,md,yml,yaml,css}'
      exclude:
        - 'package-lock.json'
        - 'composer.lock'
      run: ./node_modules/.bin/prettier -w {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    stan:
      run: make stan
    lint:
      run: make lint
    test:
      run: make test
